<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vartaalaap | इंटरव्यू मंच</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

/* HEADER */

.main-header{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
padding:60px 20px;
border-bottom:5px solid #e67e22;
text-align:center;
}

.logo-text{
font-size:48px;
font-weight:bold;
background: linear-gradient(90deg,#ff7e5f,#feb47b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
color:#e0e0e0;
font-size:18px;
margin-top:20px;
}

/* BODY */

body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:12px;
margin:5px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
color:white;
}

.publish{ background:#e67e22; }
.preview{ background:#9b59b6; }
.download{ background:#27ae60; }

.photo{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

/* IMAGE PREVIEW */

#previewArea{
display:none;
margin-top:20px;
text-align:center;
}

#previewImage{
max-width:100%;
border:2px solid #ccc;
border-radius:10px;
}

#posterArea{
width:700px;
padding:20px;
background:white;
border:2px solid #ddd;
}

</style>

</head>

<body>

<header class="main-header">

<h1 class="logo-text">
Vartaalaap
</h1>

<p class="tagline">
✦ हर भाषा, हर कहानी, एक मंच ✦
</p>

</header>

<div class="container">

<div class="card">

<h2>नया इंटरव्यू दर्ज करें</h2>

<input id="guestName" placeholder="नाम">

<input type="file" id="guestPhoto">

<textarea id="content"
rows="6"
placeholder="यहाँ इंटरव्यू लिखें">
</textarea>

<br>

<button class="preview"
onclick="createPreview()">
🖼 Image Preview
</button>

<button class="download"
onclick="downloadImage()">
⬇ Download Image
</button>

<button class="publish"
onclick="openWhatsApp()">
📱 Open WhatsApp
</button>

</div>

<!-- Hidden Poster -->

<div id="posterArea" style="display:none;">

<h2>🎤 VARTAALAAP INTERVIEW</h2>

<p id="pName"></p>

<img id="pPhoto" class="photo">

<p id="pContent"></p>

</div>

<!-- Preview -->

<div id="previewArea">

<h3>Preview Image</h3>

<img id="previewImage">

<p>
अब इस image को download करके WhatsApp में भेजें।
</p>

</div>

</div>

<script>

/* CREATE PREVIEW */

function createPreview(){

let name=
document.getElementById("guestName").value;

let content=
document.getElementById("content").value;

let photoInput=
document.getElementById("guestPhoto");

document
.getElementById("pName")
.innerText="नाम: "+name;

document
.getElementById("pContent")
.innerText=content;

let photo=
document.getElementById("pPhoto");

if(photoInput.files[0]){

let reader=
new FileReader();

reader.onload=function(e){

photo.src=e.target.result;

generateImage();

};

reader.readAsDataURL(photoInput.files[0]);

}else{

generateImage();

}

}

/* GENERATE IMAGE */

function generateImage(){

let poster=
document.getElementById("posterArea");

poster.style.display="block";

html2canvas(poster).then(canvas=>{

let imgData=
canvas.toDataURL("image/png");

document
.getElementById("previewImage")
.src=imgData;

document
.getElementById("previewArea")
.style.display="block";

poster.style.display="none";

window.generatedImage=imgData;

});

}

/* DOWNLOAD */

function downloadImage(){

if(window.generatedImage){

let link=
document.createElement("a");

link.href=
window.generatedImage;

link.download=
"Vartaalaap_Interview.png";

link.click();

}else{

alert("पहले Image Preview बनाएं");

}

}

/* OPEN WHATSAPP */

function openWhatsApp(){

window.open(
"https://web.whatsapp.com/",
"_blank"
);

alert(
"अब WhatsApp में 📎 दबाकर downloaded image भेजें."
);

}

</script>

</body>

</html>
