<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vartaalaap | इंटरव्यू मंच</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* HEADER */

.main-header{

background: linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);

padding:60px 20px;

border-bottom:5px solid #e67e22;

text-align:center;

}

.logo-text{

font-size:48px;

font-weight:bold;

display:inline-flex;

align-items:center;

gap:15px;

background: linear-gradient(
90deg,
#ff7e5f,
#feb47b
);

-webkit-background-clip:text;

-webkit-text-fill-color:transparent;

}

.logo-line{

width:220px;
height:4px;

background: linear-gradient(
90deg,
#ff7e5f,
#6dd5fa
);

}

.tagline{

color:#e0e0e0;
font-size:18px;
margin-top:20px;

}

/* BODY */

body{

font-family:Arial;

margin:0;

background:#f4f7f6;

}

.container{

max-width:850px;
margin:auto;
padding:20px;

}

.card{

background:white;

padding:25px;

border-radius:12px;

box-shadow:0 5px 15px rgba(0,0,0,0.1);

}

input, textarea{

width:100%;

padding:12px;

margin:10px 0;

border-radius:6px;

border:1px solid #ccc;

}

.buttons{

display:flex;
flex-wrap:wrap;
gap:10px;

}

button{

padding:12px;

border:none;

border-radius:6px;

font-weight:bold;

cursor:pointer;

flex:1;

color:white;

}

.listen{ background:#8e44ad; }
.speak{ background:#27ae60; }
.savepdf{ background:#2980b9; }
.publish{ background:#e67e22; }
.sharefb{ background:#1877f2; }
.sharewa{ background:#25d366; }
.copybtn{ background:#34495e; }

.interview{

border-left:6px solid #e67e22;

padding:15px;

margin-top:15px;

background:#fff;

border-radius:8px;

}

.photo{

width:120px;
height:120px;

object-fit:cover;

border-radius:10px;

}

</style>

</head>

<body>

<header class="main-header">

<h1 class="logo-text">

Vartaalaap

<span class="logo-line"></span>

</h1>

<p class="tagline">

✦ हर भाषा, हर कहानी, एक मंच ✦

</p>

</header>

<div class="container">

<div class="card">

<h2>नया इंटरव्यू दर्ज करें</h2>

<input id="guestName" placeholder="नाम">

<input id="guestLang" placeholder="भाषा">

<input type="file" id="guestPhoto">

<textarea id="content"
rows="6"
placeholder="यहाँ इंटरव्यू लिखें या बोलें">
</textarea>

<div class="buttons">

<button class="listen"
onclick="startListening()">
🎙 बोलकर लिखें
</button>

<button class="speak"
onclick="speakText()">
🔊 पढ़ें
</button>

<button class="savepdf"
onclick="savePDF()">
📄 PDF सेव करें
</button>

<button class="publish"
onclick="publishInterview()">
✅ पब्लिश करें
</button>

<button class="sharefb"
onclick="shareFacebook()">
📘 Facebook
</button>

<button class="sharewa"
onclick="shareWhatsApp()">
📱 WhatsApp
</button>

<button class="copybtn"
onclick="copyText()">
📋 Copy Text
</button>

</div>

</div>

<h2 style="text-align:center;">
ताज़ा इंटरव्यू
</h2>

<div id="feed"></div>

</div>

<script>

/* SPEECH */

function startListening(){

if(!('webkitSpeechRecognition' in window)){
alert("Speech not supported");
return;
}

let recognition =
new webkitSpeechRecognition();

recognition.lang="hi-IN";

recognition.start();

recognition.onresult=function(event){

document
.getElementById("content")
.value +=
event.results[0][0].transcript;

};

}

/* SPEAK */

function speakText(){

let text =
document.getElementById("content").value;

let speech =
new SpeechSynthesisUtterance(text);

speech.lang="hi-IN";

window.speechSynthesis.speak(speech);

}

/* SAFE WORKING PDF */

function savePDF(){

const { jsPDF } = window.jspdf;

let name =
document.getElementById("guestName").value || "";

let content =
document.getElementById("content").value || "";

let photoInput =
document.getElementById("guestPhoto");

let doc =
new jsPDF();

/* TITLE */

doc.setFontSize(16);

doc.text(
"VARTAALAAP INTERVIEW",
10,
15
);

/* NAME */

doc.setFontSize(12);

doc.text(
"नाम: "+name,
10,
30
);

/* PHOTO */

if(photoInput.files[0]){

let reader =
new FileReader();

reader.onload=function(e){

doc.addImage(
e.target.result,
"JPEG",
140,
20,
40,
40
);

addText();

};

reader.readAsDataURL(photoInput.files[0]);

}else{

addText();

}

function addText(){

let lines =
doc.splitTextToSize(
content,
180
);

doc.text(
lines,
10,
60
);

doc.save(
"Interview_"+name+".pdf"
);

}

}

/* PUBLISH */

function publishInterview(){

let name =
document.getElementById("guestName").value;

let content =
document.getElementById("content").value;

let photoInput =
document.getElementById("guestPhoto");

if(name=="" || content==""){
alert("पूरा इंटरव्यू भरें");
return;
}

let reader =
new FileReader();

reader.onload=function(e){

let box =
document.createElement("div");

box.className="interview";

box.innerHTML=`

<img src="${e.target.result}" class="photo">

<h3>${name}</h3>

<p>${content}</p>

`;

document
.getElementById("feed")
.prepend(box);

};

if(photoInput.files[0]){

reader.readAsDataURL(photoInput.files[0]);

}

}

/* SHARE */

function getShareText(){

let name =
document.getElementById("guestName").value;

let content =
document.getElementById("content").value;

return "🎤 VARTAALAAP INTERVIEW\n\n👤 "
+ name + "\n\n"
+ content;

}

function shareFacebook(){

let text =
getShareText();

let url =
"https://www.facebook.com/sharer/sharer.php?quote="
+ encodeURIComponent(text);

window.open(url,"_blank");

}

function shareWhatsApp(){

let text =
getShareText();

let url =
"https://wa.me/?text="
+ encodeURIComponent(text);

window.open(url,"_blank");

}

function copyText(){

let text =
getShareText();

navigator.clipboard.writeText(text);

alert("Text copy हो गया");

}

</script>

</body>

</html>
