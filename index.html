<head>

<title>Vartaalaap | इंटरव्यू मंच</title>

<style>

:root {
--brand:#e67e22;
--dark:#2c3e50;
--bg:#f4f7f6;
}

body{
font-family:Segoe UI, Arial;
margin:0;
background:var(--bg);
}

header{
background: linear-gradient(135deg, #1a1a2e 0%, #16213e 30%, #0f3460 60%, #533483 100%);
padding:40px 30px 35px;
text-align:center;
border-bottom:5px solid var(--brand);
position:relative;
overflow:hidden;
}

header::before{
content:'';
position:absolute;
top:-60px; left:-60px;
width:220px; height:220px;
border-radius:50%;
background:rgba(230,126,34,0.18);
}

header::after{
content:'';
position:absolute;
bottom:-80px; right:-40px;
width:280px; height:280px;
border-radius:50%;
background:rgba(155,89,182,0.15);
}

.logo{
font-size:52px;
font-weight:900;
letter-spacing:2px;
display:inline-block;
background: linear-gradient(135deg, #e67e22 0%, #e74c3c 30%, #9b59b6 60%, #3498db 100%);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
text-shadow:none;
filter: drop-shadow(0 2px 8px rgba(230,126,34,0.25));
animation: logoPulse 3s ease-in-out infinite;
}

.logo span{
background: linear-gradient(135deg, #f39c12, #e67e22);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
background-clip:text;
}

.logo-underline{
display:inline-block;
margin-top:6px;
height:4px;
width:100%;
border-radius:4px;
background: linear-gradient(90deg, #e67e22, #e74c3c, #9b59b6, #3498db);
}

@keyframes logoPulse{
0%,100%{ filter: drop-shadow(0 2px 8px rgba(230,126,34,0.25)); }
50%{ filter: drop-shadow(0 4px 18px rgba(155,89,182,0.4)); }
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
flex:1;
color:white;
}

.publish{ background:var(--brand); }
.speak{ background:#27ae60; }
.listen{ background:#8e44ad; }
.savepdf{ background:#2980b9; }

.interview{
border-left:6px solid var(--brand);
padding:15px;
margin-top:15px;
background:#fff;
border-radius:8px;
}

.lang{
font-size:12px;
background:#ffe6d1;
padding:3px 8px;
border-radius:4px;
font-weight:bold;
}

.photo{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
border:2px solid #ddd;
}

</style>

</head>

<header>
<div style="position:relative;z-index:2;">
<h1 class="logo">Varta<span>alaap</span></h1>
<div class="logo-underline" style="max-width:260px;margin:0 auto 10px;"></div>
<p style="color:rgba(255,255,255,0.75);font-size:15px;letter-spacing:2px;margin-top:4px;">✦ हर भाषा, हर कहानी, एक मंच ✦</p>
</div>
</header>

<div class="container">

<div class="card">

<h2>नया इंटरव्यू दर्ज करें</h2>

<input id="guestName" placeholder="नाम (Name)">
<input id="guestLang" placeholder="भाषा (Hindi / English)">

<label>📷 फोटो अपलोड करें</label> <input type="file" id="guestPhoto" accept="image/*">

<textarea id="content"
rows="6"
placeholder="यहाँ इंटरव्यू लिखें या बोलकर लिखें...">
</textarea>

<div class="buttons">

<button class="listen" onclick="startListening()">
🎙 बोलकर लिखें
</button>

<button class="speak" onclick="speakText()">
🔊 पढ़कर सुनाएँ
</button>

<button class="savepdf" onclick="savePDF()">
📄 PDF सेव करें
</button>

<button class="publish" onclick="publishInterview()">
✅ पब्लिश करें
</button>

</div>

</div>

<h2 style="text-align:center;">ताज़ा इंटरव्यू</h2>

<div id="feed"></div>

</div>

<script>

let recognition;

/* SPEECH TO TEXT */

function startListening(){

if(!('webkitSpeechRecognition' in window)){
alert("Speech recognition supported नहीं है");
return;
}

recognition = new webkitSpeechRecognition();

recognition.lang="hi-IN";
recognition.start();

recognition.onresult=function(event){

let speechText =
event.results[0][0].transcript;

let textarea =
document.getElementById("content");

textarea.value += speechText + " ";

};

}

/* TEXT TO SPEECH */

function speakText(){

let text =
document.getElementById("content").value;

if(text.trim()==""){
alert("पहले टेक्स्ट लिखें");
return;
}

window.speechSynthesis.cancel();

let speech =
new SpeechSynthesisUtterance(text);

speech.lang="hi-IN";

window.speechSynthesis.speak(speech);

}

function savePDF(){

const { jsPDF } = window.jspdf;

let name =
document.getElementById("guestName").value;

let lang =
document.getElementById("guestLang").value;

let content =
document.getElementById("content").value;

let doc = new jsPDF();

// Add Noto Sans Devanagari font for Hindi support
doc.addFileToVFS("NotoSansDevanagari-Regular.ttf", HINDI_FONT_B64);
doc.addFont("NotoSansDevanagari-Regular.ttf", "NotoSansDevanagari", "normal");
doc.setFont("NotoSansDevanagari");

doc.setFontSize(18);
doc.text("VARTAALAAP INTERVIEW", 10, 15);

doc.setFontSize(13);
doc.text("नाम (Name): " + name, 10, 30);
doc.text("भाषा (Language): " + lang, 10, 40);

doc.setLineWidth(0.5);
doc.line(10, 46, 200, 46);

doc.setFontSize(12);
let lines = doc.splitTextToSize(content, 185);
doc.text(lines, 10, 55);

doc.save("Interview_" + name + ".pdf");

}

/* PUBLISH INTERVIEW WITH PHOTO */

function publishInterview(){

let name =
document.getElementById("guestName").value;

let lang =
document.getElementById("guestLang").value;

let content =
document.getElementById("content").value;

let photoInput =
document.getElementById("guestPhoto");

if(name=="" || content==""){
alert("पूरा इंटरव्यू भरें");
return;
}

let reader = new FileReader();

reader.onload=function(e){

let box =
document.createElement("div");

box.className="interview";

box.innerHTML=`
<img src="${e.target.result}" class="photo">

<span class="lang">
${lang.toUpperCase()}
</span>

<h3>${name}</h3>

<p>${content}</p>
`;

document
.getElementById("feed")
.prepend(box);

};

if(photoInput.files[0]){
reader.readAsDataURL(photoInput.files[0]);
}else{

let box =
document.createElement("div");

box.className="interview";

box.innerHTML=`
<span class="lang">
${lang.toUpperCase()}
</span>

<h3>${name}</h3>

<p>${content}</p>
`;

document
.getElementById("feed")
.prepend(box);

}

alert("इंटरव्यू पब्लिश हो गया");

}

</script>
