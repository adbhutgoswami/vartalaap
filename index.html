<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vartaalaap | इंटरव्यू मंच</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

/* HEADER */

.main-header{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
padding:60px 20px;
border-bottom:5px solid #e67e22;
text-align:center;
}

.logo-text{
font-size:48px;
font-weight:bold;
background: linear-gradient(90deg,#ff7e5f,#feb47b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.tagline{
color:#e0e0e0;
font-size:18px;
margin-top:20px;
}

/* BODY */

body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:8px;
}

button{
padding:10px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
flex:1;
color:white;
font-size:14px;
}

.listen{ background:#8e44ad; }
.speak{ background:#27ae60; }
.pdf{ background:#2980b9; }
.preview{ background:#9b59b6; }
.download{ background:#16a085; }
.publish{ background:#e67e22; }
.fb{ background:#1877f2; }
.wa{ background:#25d366; }
.copy{ background:#34495e; }

.interview{
border-left:6px solid #e67e22;
padding:15px;
margin-top:15px;
background:#fff;
border-radius:8px;
position:relative;
}

.delete-btn{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
border:none;
padding:5px 8px;
cursor:pointer;
border-radius:5px;
font-size:12px;
}

.date-text{
font-size:12px;
color:#777;
margin-bottom:5px;
}

.photo{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

/* POSTER */

#posterArea{
width:700px;
padding:20px;
background:white;
display:none;
}

#previewArea{
display:none;
text-align:center;
margin-top:20px;
}

#previewImage{
max-width:100%;
border-radius:10px;
}

</style>

</head>

<body>

<header class="main-header">

<h1 class="logo-text">
Vartaalaap
</h1>

<p class="tagline">
✦ हर भाषा, हर कहानी, एक मंच ✦
</p>

</header>

<div class="container">

<div class="card">

<h2>नया इंटरव्यू दर्ज करें</h2>

<input id="guestName" placeholder="नाम">

<input type="file" id="guestPhoto">

<textarea id="content"
rows="6"
placeholder="यहाँ इंटरव्यू लिखें या बोलें">
</textarea>

<div class="buttons">

<button class="listen" onclick="startListening()">🎙 बोलकर लिखें</button>

<button class="speak" onclick="speakText()">🔊 पढ़ें</button>

<button class="pdf" onclick="savePDF()">📄 PDF</button>

<button class="preview" onclick="createPreview()">🖼 Preview</button>

<button class="download" onclick="downloadImage()">⬇ Download</button>

<button class="publish" onclick="publishInterview()">✅ Publish</button>

<button class="fb" onclick="openFacebook()">📘 Facebook</button>

<button class="wa" onclick="openWhatsApp()">📱 WhatsApp</button>

<button class="copy" onclick="copyText()">📋 Copy</button>

</div>

</div>

<h2 style="text-align:center;">ताज़ा इंटरव्यू</h2>

<div id="feed"></div>

<div id="previewArea">

<h3>Image Preview</h3>

<img id="previewImage">

</div>

</div>

<!-- Hidden Poster -->

<div id="posterArea">

<h2>🎤 VARTAALAAP INTERVIEW</h2>

<p id="pName"></p>

<img id="pPhoto" class="photo">

<p id="pContent"></p>

</div>

<script>

/* LOAD SAVED */

window.onload=function(){

let saved=localStorage.getItem("interviews");

if(saved){

document.getElementById("feed").innerHTML=saved;

}

}

/* SPEECH */

function startListening(){

let recognition=new webkitSpeechRecognition();

recognition.lang="hi-IN";

recognition.start();

recognition.onresult=function(event){

document.getElementById("content").value+=
event.results[0][0].transcript;

};

}

/* SPEAK */

function speakText(){

let speech=new SpeechSynthesisUtterance(
document.getElementById("content").value
);

speech.lang="hi-IN";

window.speechSynthesis.speak(speech);

}

/* CREATE IMAGE */

function createPreview(){

let name=document.getElementById("guestName").value;
let content=document.getElementById("content").value;
let photoInput=document.getElementById("guestPhoto");

document.getElementById("pName").innerText="नाम: "+name;
document.getElementById("pContent").innerText=content;

let photo=document.getElementById("pPhoto");

if(photoInput.files[0]){

let reader=new FileReader();

reader.onload=function(e){

photo.src=e.target.result;

generateImage();

};

reader.readAsDataURL(photoInput.files[0]);

}

}

/* GENERATE */

function generateImage(){

let poster=document.getElementById("posterArea");

poster.style.display="block";

html2canvas(poster).then(canvas=>{

let imgData=canvas.toDataURL("image/png");

document.getElementById("previewImage").src=imgData;

document.getElementById("previewArea").style.display="block";

poster.style.display="none";

window.generatedImage=imgData;

});

}

/* DOWNLOAD */

function downloadImage(){

if(window.generatedImage){

let link=document.createElement("a");

link.href=window.generatedImage;

link.download="Vartaalaap.png";

link.click();

}

}

/* PDF */

function savePDF(){

if(window.generatedImage){

const { jsPDF }=window.jspdf;

let pdf=new jsPDF();

pdf.addImage(
window.generatedImage,
"PNG",
0,
0,
210,
0
);

pdf.save("Interview.pdf");

}

}

/* PUBLISH */

function publishInterview(){

let name=document.getElementById("guestName").value;
let content=document.getElementById("content").value;

let now=new Date();

let reader=new FileReader();

let photoInput=document.getElementById("guestPhoto");

reader.onload=function(e){

let box=document.createElement("div");

box.className="interview";

box.innerHTML=`

<button class="delete-btn"
onclick="deleteInterview(this)">
Delete
</button>

<div class="date-text">
${now.toLocaleString()}
</div>

<img src="${e.target.result}" class="photo">

<h3>${name}</h3>

<p>${content}</p>

`;

document.getElementById("feed").prepend(box);

localStorage.setItem(
"interviews",
document.getElementById("feed").innerHTML
);

};

if(photoInput.files[0]){

reader.readAsDataURL(photoInput.files[0]);

}

}

/* DELETE */

function deleteInterview(btn){

btn.parentElement.remove();

localStorage.setItem(
"interviews",
document.getElementById("feed").innerHTML
);

}

/* OPEN WHATSAPP */

function openWhatsApp(){

window.open("https://web.whatsapp.com/");

alert("Download image करके WhatsApp में भेजें");

}

/* FACEBOOK */

function openFacebook(){

window.open("https://facebook.com");

}

/* COPY */

function copyText(){

let name=document.getElementById("guestName").value;
let content=document.getElementById("content").value;

navigator.clipboard.writeText(
name+"\n\n"+content
);

alert("Text copied");

}

</script>

</body>

</html>
