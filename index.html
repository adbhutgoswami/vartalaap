<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vartaalaap | इंटरव्यू मंच</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

/* HEADER */

.main-header{

background: linear-gradient(
135deg,
#0f2027,
#203a43,
#2c5364
);

padding:60px 20px;
border-bottom:5px solid #e67e22;
text-align:center;
}

.logo-text{

font-size:48px;
font-weight:bold;

background: linear-gradient(
90deg,
#ff7e5f,
#feb47b
);

-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.logo-line{

display:inline-block;
width:220px;
height:4px;

background: linear-gradient(
90deg,
#ff7e5f,
#6dd5fa
);

margin-left:10px;
}

.tagline{

color:#e0e0e0;
font-size:18px;
margin-top:20px;

}

/* BODY */

body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea{

width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;

}

.buttons{

display:flex;
flex-wrap:wrap;
gap:10px;

}

button{

padding:12px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
flex:1;
color:white;

}

.listen{ background:#8e44ad; }
.speak{ background:#27ae60; }
.savepdf{ background:#2980b9; }
.publish{ background:#e67e22; }

.photo{

width:120px;
height:120px;
object-fit:cover;
border-radius:10px;

}

</style>

</head>

<body>

<header class="main-header">

<h1 class="logo-text">

Vartaalaap

<span class="logo-line"></span>

</h1>

<p class="tagline">

✦ हर भाषा, हर कहानी, एक मंच ✦

</p>

</header>

<div class="container">

<div class="card">

<h2>नया इंटरव्यू दर्ज करें</h2>

<input id="guestName" placeholder="नाम">

<input id="guestLang" placeholder="भाषा">

<input type="file" id="guestPhoto">

<textarea id="content"
rows="6"
placeholder="यहाँ इंटरव्यू लिखें">
</textarea>

<div class="buttons">

<button class="listen"
onclick="startListening()">
🎙 बोलकर लिखें
</button>

<button class="speak"
onclick="speakText()">
🔊 पढ़ें
</button>

<button class="savepdf"
onclick="savePDF()">
📄 PDF सेव करें
</button>

</div>

</div>

</div>

<script>

/* SPEECH */

function startListening(){

if(!('webkitSpeechRecognition' in window)){
alert("Speech not supported");
return;
}

let recognition =
new webkitSpeechRecognition();

recognition.lang="hi-IN";

recognition.start();

recognition.onresult=function(event){

document
.getElementById("content")
.value +=
event.results[0][0].transcript;

};

}

/* SPEAK */

function speakText(){

let text =
document.getElementById("content").value;

let speech =
new SpeechSynthesisUtterance(text);

speech.lang="hi-IN";

window.speechSynthesis.speak(speech);

}

/* HINDI FONT PDF */

async function savePDF(){

const { jsPDF } = window.jspdf;

let name =
document.getElementById("guestName").value;

let content =
document.getElementById("content").value;

let doc =
new jsPDF();

/* LOAD FONT */

let font =
await fetch(
"NotoSansDevanagari-Regular.ttf"
)
.then(res=>res.arrayBuffer());

doc.addFileToVFS(
"NotoSans.ttf",
font
);

doc.addFont(
"NotoSans.ttf",
"NotoSans",
"normal"
);

doc.setFont(
"NotoSans"
);

/* TITLE */

doc.setFontSize(16);

doc.text(
"VARTAALAAP INTERVIEW",
10,
15
);

/* NAME */

doc.setFontSize(12);

doc.text(
"नाम: "+name,
10,
30
);

/* CONTENT */

let lines =
doc.splitTextToSize(
content,
180
);

doc.text(
lines,
10,
50
);

/* SAVE */

doc.save(
"Interview_"+name+".pdf"
);

}

</script>

</body>

</html>
