<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vartaalaap | इंटरव्यू मंच</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>

:root{
--brand:#e67e22;
--dark:#2c3e50;
--bg:#f4f7f6;
}

body{
font-family:Segoe UI, Arial;
margin:0;
background:var(--bg);
}

header{
background:white;
padding:25px;
text-align:center;
border-bottom:5px solid var(--brand);
}

.logo{
font-size:40px;
font-weight:bold;
}

.logo span{
color:var(--brand);
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
margin-bottom:25px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

.buttons{
display:flex;
gap:10px;
flex-wrap:wrap;
}

button{
padding:12px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
flex:1;
color:white;
}

.publish{ background:var(--brand); }
.speak{ background:#27ae60; }
.listen{ background:#8e44ad; }
.savepdf{ background:#2980b9; }
.sharefb{ background:#1877f2; }
.sharewa{ background:#25d366; }
.copybtn{ background:#34495e; }

.interview{
border-left:6px solid var(--brand);
padding:15px;
margin-top:15px;
background:#fff;
border-radius:8px;
}

.lang{
font-size:12px;
background:#ffe6d1;
padding:3px 8px;
border-radius:4px;
font-weight:bold;
}

.photo{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
margin-bottom:10px;
border:2px solid #ddd;
}

</style>

</head>

<body>

<header>

<img src="logo.png" width="120">

<h1 class="logo">
Varta<span>alaap</span>
</h1>

<p>हर भाषा, हर कहानी, एक मंच</p>

</header>

<div class="container">

<div class="card">

<h2>नया इंटरव्यू दर्ज करें</h2>

<input id="guestName"
placeholder="नाम (Name)">

<input id="guestLang"
placeholder="भाषा (Hindi / English)">

<label>📷 फोटो अपलोड करें</label>

<input type="file"
id="guestPhoto"
accept="image/*">

<textarea
id="content"
rows="6"
placeholder="यहाँ इंटरव्यू लिखें या बोलकर लिखें...">
</textarea>

<div class="buttons">

<button class="listen"
onclick="startListening()">
🎙 बोलकर लिखें
</button>

<button class="speak"
onclick="speakText()">
🔊 पढ़कर सुनाएँ
</button>

<button class="savepdf"
onclick="function savePDF(){

const { jsPDF } = window.jspdf;

let name =
document.getElementById("guestName").value;

let lang =
document.getElementById("guestLang").value;

let content =
document.getElementById("content").value;

/* CREATE PDF */

let doc = new jsPDF();

/* TRY ADD LOGO */

let img = new Image();

img.src = "logo.png";

/* IF LOGO LOADS */

img.onload = function(){

createPDF(true);

};

/* IF LOGO FAILS */

img.onerror = function(){

createPDF(false);

};

function createPDF(hasLogo){

if(hasLogo){

doc.addImage(
img,
"PNG",
10,
5,
40,
20
);

doc.setFontSize(16);

doc.text(
"VARTAALAAP INTERVIEW",
10,
35
);

doc.setFontSize(12);

doc.text(
"Name: "+name,
10,
50
);

doc.text(
"Language: "+lang,
10,
60
);

var yPos = 75;

}else{

doc.setFontSize(16);

doc.text(
"VARTAALAAP INTERVIEW",
10,
15
);

doc.setFontSize(12);

doc.text(
"Name: "+name,
10,
30
);

doc.text(
"Language: "+lang,
10,
40
);

var yPos = 55;

}

/* ADD TEXT */

let lines =
doc.splitTextToSize(
content,
180
);

doc.text(
lines,
10,
yPos
);

/* SAVE */

doc.save(
"Interview_"+name+".pdf"
);

}

}()">
📄 PDF सेव करें
</button>

<button class="publish"
onclick="publishInterview()">
✅ पब्लिश करें
</button>

<button class="sharefb"
onclick="shareFacebook()">
📘 Facebook शेयर
</button>

<button class="sharewa"
onclick="shareWhatsApp()">
📱 WhatsApp शेयर
</button>

<button class="copybtn"
onclick="copyText()">
📋 Copy Text
</button>

</div>

</div>

<h2 style="text-align:center;">
ताज़ा इंटरव्यू
</h2>

<div id="feed"></div>

</div>

<script>

let recognition;

/* SPEECH TO TEXT */

function startListening(){

if(!('webkitSpeechRecognition' in window)){
alert("Speech recognition supported नहीं है");
return;
}

recognition =
new webkitSpeechRecognition();

recognition.lang="hi-IN";

recognition.start();

recognition.onresult=function(event){

let speechText =
event.results[0][0].transcript;

let textarea =
document.getElementById("content");

textarea.value += speechText + " ";

};

}

/* TEXT TO SPEECH */

function speakText(){

let text =
document.getElementById("content").value;

if(text.trim()==""){
alert("पहले टेक्स्ट लिखें");
return;
}

window.speechSynthesis.cancel();

let speech =
new SpeechSynthesisUtterance(text);

speech.lang="hi-IN";

window.speechSynthesis.speak(speech);

}

/* SAVE PDF WITH LOGO */

function savePDF(){

const { jsPDF } = window.jspdf;

let name =
document.getElementById("guestName").value;

let lang =
document.getElementById("guestLang").value;

let content =
document.getElementById("content").value;

let doc = new jsPDF();

let img = new Image();

img.src = "logo.png";

img.onload=function(){

doc.addImage(img,"PNG",10,5,40,20);

doc.setFontSize(16);

doc.text(
"VARTAALAAP INTERVIEW",
10,35
);

doc.setFontSize(12);

doc.text(
"Name: "+name,
10,50
);

doc.text(
"Language: "+lang,
10,60
);

let lines =
doc.splitTextToSize(
content,
180
);

doc.text(
lines,
10,
75
);

doc.save(
"Interview_"+name+".pdf"
);

};

}

/* PUBLISH */

function publishInterview(){

let name =
document.getElementById("guestName").value;

let lang =
document.getElementById("guestLang").value;

let content =
document.getElementById("content").value;

let photoInput =
document.getElementById("guestPhoto");

if(name=="" || content==""){
alert("पूरा इंटरव्यू भरें");
return;
}

let reader =
new FileReader();

reader.onload=function(e){

let box =
document.createElement("div");

box.className="interview";

box.innerHTML=`

<img src="${e.target.result}"
class="photo">

<span class="lang">
${lang.toUpperCase()}
</span>

<h3>${name}</h3>

<p>${content}</p>

`;

document
.getElementById("feed")
.prepend(box);

};

if(photoInput.files[0]){

reader.readAsDataURL(
photoInput.files[0]
);

}else{

let box =
document.createElement("div");

box.className="interview";

box.innerHTML=`

<span class="lang">
${lang.toUpperCase()}
</span>

<h3>${name}</h3>

<p>${content}</p>

`;

document
.getElementById("feed")
.prepend(box);

}

alert("इंटरव्यू पब्लिश हो गया");

}

/* SHARE TEXT */

function getShareText(){

let name =
document.getElementById("guestName").value;

let content =
document.getElementById("content").value;

let logoURL =
window.location.origin + "/logo.png";

let text =
"🎤 VARTAALAAP INTERVIEW\n\n"
+ "👤 Name: " + name + "\n\n"
+ content + "\n\n"
+ "🌐 Logo: " + logoURL;

return text;

}

/* FACEBOOK */

function shareFacebook(){

let text =
getShareText();

let url =
"https://www.facebook.com/sharer/sharer.php?quote="
+ encodeURIComponent(text);

window.open(
url,
"_blank"
);

}

/* WHATSAPP */

function shareWhatsApp(){

let text =
getShareText();

let url =
"https://wa.me/?text="
+ encodeURIComponent(text);

window.open(
url,
"_blank"
);

}

/* COPY */

function copyText(){

let text =
getShareText();

navigator.clipboard
.writeText(text);

alert(
"Text copy हो गया"
);

}

</script>

</body>

</html>
