<!DOCTYPE html>
<html lang="hi">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vartaalaap | इंटरव्यू मंच</title>

<!-- Libraries -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>

/* HEADER */

.main-header{
background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
padding:60px 20px;
border-bottom:5px solid #e67e22;
text-align:center;
}

.logo-text{
font-size:48px;
font-weight:bold;
background: linear-gradient(90deg,#ff7e5f,#feb47b);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.logo-line{
display:inline-block;
width:220px;
height:4px;
background: linear-gradient(90deg,#ff7e5f,#6dd5fa);
}

.tagline{
color:#e0e0e0;
font-size:18px;
margin-top:20px;
}

/* BODY */

body{
font-family:Arial;
margin:0;
background:#f4f7f6;
}

.container{
max-width:850px;
margin:auto;
padding:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

.buttons{
display:flex;
flex-wrap:wrap;
gap:10px;
}

button{
padding:12px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
flex:1;
color:white;
}

.listen{ background:#8e44ad; }
.speak{ background:#27ae60; }
.savepdf{ background:#2980b9; }
.publish{ background:#e67e22; }
.sharefb{ background:#1877f2; }
.sharewa{ background:#25d366; }
.copybtn{ background:#34495e; }
.shareimg{ background:#9b59b6; }

.photo{
width:120px;
height:120px;
object-fit:cover;
border-radius:10px;
}

.interview{
border-left:6px solid #e67e22;
padding:15px;
margin-top:15px;
background:#fff;
border-radius:8px;
position:relative;
}

.delete-btn{
position:absolute;
top:10px;
right:10px;
background:red;
color:white;
border:none;
padding:5px 8px;
cursor:pointer;
border-radius:5px;
font-size:12px;
}

.date-text{
font-size:12px;
color:#777;
margin-bottom:5px;
}

/* PDF Layout */

#pdfArea{
width:800px;
padding:20px;
background:white;
}

</style>

</head>

<body>

<header class="main-header">

<h1 class="logo-text">
Vartaalaap
<span class="logo-line"></span>
</h1>

<p class="tagline">
✦ हर भाषा, हर कहानी, एक मंच ✦
</p>

</header>

<div class="container">

<div class="card">

<h2>नया इंटरव्यू दर्ज करें</h2>

<input id="guestName" placeholder="नाम">

<input type="file" id="guestPhoto">

<textarea id="content"
rows="6"
placeholder="यहाँ इंटरव्यू लिखें या बोलें">
</textarea>

<div class="buttons">

<button class="listen"
onclick="startListening()">
🎙 बोलकर लिखें
</button>

<button class="speak"
onclick="speakText()">
🔊 पढ़ें
</button>

<button class="savepdf"
onclick="savePDF()">
📄 Multi-Page PDF
</button>

<button class="shareimg"
onclick="shareAsImage()">
🖼 Share Image
</button>

<button class="publish"
onclick="publishInterview()">
✅ Publish
</button>

<button class="sharefb"
onclick="shareFacebook()">
📘 Facebook
</button>

<button class="sharewa"
onclick="shareWhatsApp()">
📱 WhatsApp
</button>

<button class="copybtn"
onclick="copyText()">
📋 Copy Text
</button>

</div>

</div>

<h2 style="text-align:center;">
ताज़ा इंटरव्यू
</h2>

<div id="feed"></div>

</div>

<!-- Hidden Layout -->

<div id="pdfArea" style="display:none;">

<h2>🎤 VARTAALAAP INTERVIEW</h2>

<p id="pdfName"></p>

<img id="pdfPhoto"
style="width:120px; margin-top:10px;">

<p id="pdfContent"
style="margin-top:20px;"></p>

</div>

<script>

/* LOAD SAVED */

window.onload=function(){

let saved=
localStorage.getItem("interviews");

if(saved){

document
.getElementById("feed")
.innerHTML=saved;

}

}

/* SPEECH */

function startListening(){

let recognition=
new webkitSpeechRecognition();

recognition.lang="hi-IN";

recognition.start();

recognition.onresult=function(event){

document
.getElementById("content")
.value +=
event.results[0][0].transcript;

};

}

/* SPEAK */

function speakText(){

let text=
document.getElementById("content").value;

let speech=
new SpeechSynthesisUtterance(text);

speech.lang="hi-IN";

window.speechSynthesis.speak(speech);

}

/* PREPARE IMAGE */

function preparePDF(callback){

let name=
document.getElementById("guestName").value;

let content=
document.getElementById("content").value;

let photoInput=
document.getElementById("guestPhoto");

document
.getElementById("pdfName")
.innerText="नाम: "+name;

document
.getElementById("pdfContent")
.innerText=content;

let pdfPhoto=
document.getElementById("pdfPhoto");

if(photoInput.files[0]){

let reader=
new FileReader();

reader.onload=function(e){

pdfPhoto.src=e.target.result;

generateCanvas();

};

reader.readAsDataURL(photoInput.files[0]);

}else{

generateCanvas();

}

function generateCanvas(){

let pdfArea=
document.getElementById("pdfArea");

pdfArea.style.display="block";

html2canvas(pdfArea).then(canvas=>{

pdfArea.style.display="none";

callback(canvas);

});

}

}

/* MULTI PAGE PDF */

function savePDF(){

preparePDF(function(canvas){

const { jsPDF }=window.jspdf;

let imgData=
canvas.toDataURL("image/png");

let pdf=
new jsPDF();

let width=210;

let height=
canvas.height * width /
canvas.width;

let y=0;

while(height>0){

pdf.addImage(
imgData,
"PNG",
0,
y,
width,
height
);

height-=297;

if(height>0){

pdf.addPage();

y-=297;

}

}

pdf.save("Interview.pdf");

});

}

/* SHARE IMAGE */

function shareAsImage(){

preparePDF(function(canvas){

let link=document.createElement("a");

link.download="Interview_Image.png";

link.href=canvas.toDataURL();

link.click();

});

}

/* WHATSAPP FIX */

function shareWhatsApp(){

preparePDF(function(canvas){

/* Convert canvas to image */

let imageData =
canvas.toDataURL("image/png");

/* Force download */

let link =
document.createElement("a");

link.href = imageData;

link.download =
"Vartaalaap_Interview.png";

/* Required for some browsers */

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

/* Open WhatsApp after download */

setTimeout(function(){

window.open(
"https://web.whatsapp.com/",
"_blank"
);

alert(
"Image download हो गई है.\nअब WhatsApp में 📎 (Attach) दबाकर image भेजें."
);

},2000);

});
}

preparePDF(function(canvas){

let link=document.createElement("a");

link.download="Vartaalaap_Image.png";

link.href=canvas.toDataURL("image/png");

document.body.appendChild(link);

link.click();

document.body.removeChild(link);

setTimeout(function(){

window.open(
"https://web.whatsapp.com/",
"_blank"
);

alert(
"Image download हो गई है.\nअब WhatsApp में 📎 Attach करके image भेजें."
);

},1500);

});

}

/* FACEBOOK */

function shareFacebook(){

window.open(
"https://www.facebook.com/"
);

}

/* COPY */

function copyText(){

let name=
document.getElementById("guestName").value;

let content=
document.getElementById("content").value;

navigator.clipboard.writeText(

"🎤 Vartaalaap Interview\n\n"
+ name + "\n\n"
+ content

);

alert("Text copied");

}

/* PUBLISH */

function publishInterview(){

let name=
document.getElementById("guestName").value;

let content=
document.getElementById("content").value;

let photoInput=
document.getElementById("guestPhoto");

/* DATE */

let now=new Date();

let dateString=
now.toLocaleString();

let reader=new FileReader();

reader.onload=function(e){

let box=document.createElement("div");

box.className="interview";

box.innerHTML=`

<button class="delete-btn"
onclick="deleteInterview(this)">
Delete
</button>

<div class="date-text">
${dateString}
</div>

<img src="${e.target.result}" class="photo">

<h3>${name}</h3>

<p>${content}</p>

`;

document
.getElementById("feed")
.prepend(box);

/* SAVE */

localStorage.setItem(
"interviews",
document.getElementById("feed").innerHTML
);

};

if(photoInput.files[0]){

reader.readAsDataURL(photoInput.files[0]);

}

}

/* DELETE */

function deleteInterview(btn){

btn.parentElement.remove();

localStorage.setItem(
"interviews",
document.getElementById("feed").innerHTML
);

}

</script>

</body>

</html>
